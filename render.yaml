services:
  - type: web
    name: farmai-twilio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && (which ffmpeg || (echo "Installing ffmpeg static build..." && mkdir -p bin && curl -sSL https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz | tar -xJ --strip-components=1 -C bin))
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
